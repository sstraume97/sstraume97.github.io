<button id="a11y-toggle" aria-label="Åpne tilgjengelighetsvalg" aria-expanded="false" aria-controls="a11y-panel">
  <svg viewBox="0 0 515 515" xmlns="http://www.w3.org/2000/svg" aria-hidden="true"><g><path d="M193.32,90.542c25.083,0 45.293,-20.423 45.293,-45.293c0,-25.083 -20.21,-45.249 -45.293,-45.249c-24.996,0 -45.293,20.171 -45.293,45.249c-0.005,24.864 20.292,45.293 45.293,45.293Z" style="fill:#fff;fill-rule:nonzero;"></path><path d="M413.505,427.424c7.22,11.748 23.803,16.578 36.323,9.057c12.432,-7.433 16.195,-23.076 9.101,-36.148l-77.169,-133.275c-4.83,-8.035 -13.247,-12.563 -21.922,-12.82l-113.235,0l-1.067,-34.184l82.256,0c11.24,-0.684 20.423,-9.232 20.423,-20.724c0,-11.322 -8.932,-20.128 -20.423,-20.554l-84.651,0l-2.948,-38.844c-1.581,-23.759 -22.048,-42.476 -46.108,-41.147c-24.142,1.367 -42.432,22.179 -41.234,46.234l7.865,137.377c2.007,24.055 22.179,41.278 46.064,41.147l146.779,0l59.946,103.882Z" style="fill:#fff;fill-rule:nonzero;"></path><path d="M222.418,479.078c-74.265,0 -134.473,-60.077 -134.473,-134.473c-0,-40.72 18.416,-77.043 47.131,-101.743l-2.396,-42.049c-48.071,30.038 -80.374,82.939 -80.374,143.787c0,93.878 76.102,170.15 170.112,170.15c69.178,0 128.363,-41.661 154.94,-100.972l-23.929,-41.404c-12.82,60.766 -66.361,106.704 -131.011,106.704Z" style="fill:#fff;fill-rule:nonzero;"></path></g></svg>
</button>
<div id="a11y-panel" role="region" aria-label="Tilgjengelighetsvalg">
  <strong style="font-size:13px">Skriftstørrelse</strong>
  <div style="display:flex; gap:8px">
    <button type="button" data-a11y-font="down" aria-label="Mindre skrift" style="flex:1">A−</button>
    <button type="button" data-a11y-font="reset" aria-label="Nullstill skriftstørrelse" style="flex:1">A</button>
    <button type="button" data-a11y-font="up" aria-label="Større skrift" style="flex:1">A+</button>
  </div>
  <button type="button" id="a11y-contrast-toggle">Høykontrast: av</button>
</div>
<script>
(function () {
  var STEP = 0.1, MIN = 0.8, MAX = 1.6;
  var toggle = document.getElementById('a11y-toggle');
  var panel = document.getElementById('a11y-panel');
  var contrastBtn = document.getElementById('a11y-contrast-toggle');
  var root = document.documentElement;

  function currentZoom() {
    return parseFloat(root.style.zoom || localStorage.getItem('a11yZoom') || '1');
  }
  function setZoom(z) {
    z = Math.min(MAX, Math.max(MIN, z));
    root.style.zoom = z;
    localStorage.setItem('a11yZoom', z);
  }
  function setContrast(on) {
    root.classList.toggle('a11y-contrast', on);
    localStorage.setItem('a11yContrast', on ? '1' : '0');
    contrastBtn.textContent = 'Høykontrast: ' + (on ? 'på' : 'av');
  }

  setZoom(currentZoom());
  setContrast(localStorage.getItem('a11yContrast') === '1');

  toggle.addEventListener('click', function () {
    var open = panel.classList.toggle('open');
    toggle.setAttribute('aria-expanded', open ? 'true' : 'false');
  });

  panel.querySelectorAll('[data-a11y-font]').forEach(function (btn) {
    btn.addEventListener('click', function () {
      var action = btn.getAttribute('data-a11y-font');
      if (action === 'up') setZoom(currentZoom() + STEP);
      else if (action === 'down') setZoom(currentZoom() - STEP);
      else setZoom(1);
    });
  });

  contrastBtn.addEventListener('click', function () {
    setContrast(!root.classList.contains('a11y-contrast'));
  });

  document.addEventListener('click', function (e) {
    if (!panel.contains(e.target) && e.target !== toggle && !toggle.contains(e.target)) {
      panel.classList.remove('open');
      toggle.setAttribute('aria-expanded', 'false');
    }
  });
})();
</script>
